services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3001/api
      VITE_WS_URL: http://localhost:3001
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shadownet-network

  app:
    build: ./springboot
    ports:
      - "3001:3001"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mysql://db:3306/shadownet?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: shadownet
      DB_PASSWORD: ${DB_PASSWORD:-change-me-local-only}
      JWT_SECRET: ${JWT_SECRET:-change-me-local-only-jwt-secret-64-characters-minimum}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/3001' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - shadownet-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-local-only-root}
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: shadownet
      MYSQL_USER: shadownet
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me-local-only}
    ports:
      - "3305:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shadownet-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - shadownet-network

volumes:
  db_data:

networks:
  shadownet-network:
    driver: bridge
