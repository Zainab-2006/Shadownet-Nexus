services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ""
        VITE_WS_BASE_URL: ""
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      - backend
    networks:
      - shadownet-network

  backend:
    build: ./springboot
    ports:
      - "${BACKEND_PORT:-3002}:3001"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: shadownet
      DB_USERNAME: ${DB_USERNAME:-Shadownet}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DRIVER_CLASS: ${DRIVER_CLASS:-com.mysql.cj.jdbc.Driver}
      HIBERNATE_DIALECT: ${HIBERNATE_DIALECT:-org.hibernate.dialect.MySQLDialect}
      DB_ALLOW_PUBLIC_KEY_RETRIEVAL: true
      DB_SERVER_TIMEZONE: UTC
      DB_CREATE_IF_NOT_EXIST: true
      DB_SSL_MODE: DISABLED
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_ENCRYPTION_KEY: ${EMAIL_ENCRYPTION_KEY:-local-dev-email-key}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:8080,http://127.0.0.1:8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/3001' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - shadownet-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: shadownet
      MYSQL_USER: ${DB_USERNAME:-Shadownet}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3305:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shadownet-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - shadownet-network

volumes:
  db_data:

networks:
  shadownet-network:
    driver: bridge
