apiVersion: apps/v1
kind: Deployment
metadata:
  name: shadownet-nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shadownet-nexus
  template:
    metadata:
      labels:
        app: shadownet-nexus
    spec:
      containers:
      - name: app
        image: shadownet-nexus:latest
        ports:
        - containerPort: 3001
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
        - name: DB_URL
              value: "jdbc:mysql://mysql-service:3305/shadownet"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: shadownet-nexus-service
spec:
  selector:
    app: shadownet-nexus
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: LoadBalancer
