apiVersion: v1
kind: Namespace
metadata:
  name: shadownet
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shadownet-backend
  namespace: shadownet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shadownet-backend
  template:
    metadata:
      labels:
        app: shadownet-backend
    spec:
      containers:
        - name: shadownet-backend
          image: ghcr.io/your-org/shadownet-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_TYPE
              value: "sqlite"
            - name: DATABASE_PATH
              value: "/var/data/shadownet.db"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shadownet-secrets
                  key: jwtSecret
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: shadownet-backend
  namespace: shadownet
spec:
  selector:
    app: shadownet-backend
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: shadownet-secrets
  namespace: shadownet
stringData:
  jwtSecret: "change-this-secret-in-production"
