services:
  mysql-test:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: shadownet_test
      MYSQL_USER: test_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend-test:
    build:
      context: ./springboot
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql-test
      DB_PORT: 3306
      DB_NAME: shadownet_test
      DB_USERNAME: test_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ALLOW_PUBLIC_KEY_RETRIEVAL: true
      DB_SERVER_TIMEZONE: UTC
      DB_CREATE_IF_NOT_EXIST: true
      DB_SSL_MODE: DISABLED
      JWT_SECRET: test-only-jwt-secret-at-least-32-characters
      EMAIL_ENCRYPTION_KEY: test-only-email-key
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "3001:3001"
    depends_on:
      mysql-test:
        condition: service_healthy

  cypress:
    image: cypress/included:13.6.0
    working_dir: /e2e
    volumes:
      - ./cypress:/e2e/cypress
      - ./cypress.config.cjs:/e2e/cypress.config.cjs
    environment:
      CYPRESS_baseUrl: http://localhost:3000
    depends_on:
      - frontend-test
    command: cypress run

  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: ""
      VITE_WS_BASE_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend-test

