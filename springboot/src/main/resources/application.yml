spring:
  application:
    name: shadownet-nexus
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:${DB_JDBC_URL:jdbc:mysql://127.0.0.1:3305/shadownet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}}}
    username: ${DB_USERNAME:${DATABASE_USER:root}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD:root}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false
    ignore-failed-migrations: true
  web:
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176,http://localhost:3000,http://localhost:8080,http://127.0.0.1:8080,http://localhost:8081,https://shadownet-frontend.onrender.com,https://shadownet-nexus.vercel.app}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  security:
    require-ssl: ${REQUIRE_SSL:false}
    require-email-verification: ${REQUIRE_EMAIL_VERIFICATION:false}
    email-encryption-key: ${EMAIL_ENCRYPTION_KEY:}

server:
  port: ${PORT:3001}
  address: 0.0.0.0
  forward-headers-strategy: framework
  servlet:
    context-path: /
    session:
      cookie:
        http-only: true
        secure: ${SECURE_COOKIES:false}
        same-site: strict

logging:
  level:
    root: INFO
    com.shadownet.nexus: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
    org.flywaydb: INFO
    AUDIT: INFO
    SECURITY: WARN
  pattern:
    console: '%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:when_authorized}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:${DB_JDBC_URL:jdbc:mysql://${DB_HOST:${DATABASE_HOST:127.0.0.1}}:${DB_PORT:${DATABASE_PORT:3306}}/${DB_NAME:${DATABASE_NAME:shadownet}}?sslMode=${DB_SSL_MODE:DISABLED}&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&serverTimezone=${DB_SERVER_TIMEZONE:UTC}&createDatabaseIfNotExist=${DB_CREATE_IF_NOT_EXIST:true}}}}
    username: ${DB_USERNAME:${DATABASE_USER:}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 60000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    connect-retries: 60
    connect-retries-interval: 5s

logging:
  level:
    com.shadownet.nexus: INFO
    org.springframework.security: WARN

management:
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
  api-docs:
    enabled: ${API_DOCS_ENABLED:false}

docker:
  runtime:
    enabled: ${DOCKER_RUNTIME_ENABLED:false}

server:
  servlet:
    session:
      cookie:
        secure: true

app:
  security:
    require-ssl: true
    require-email-verification: true

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:${DB_JDBC_URL:jdbc:mysql://127.0.0.1:3305/shadownet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}}}
    username: ${DB_USERNAME:${DATABASE_USER:Shadownet}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD:root}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/${DB_NAME:shadownet}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:Shadownet}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 60000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
  flyway:
    enabled: true
    connect-retries: 60
    connect-retries-interval: 5s

server:
  servlet:
    session:
      cookie:
        secure: false

app:
  security:
    require-ssl: false
    require-email-verification: false
