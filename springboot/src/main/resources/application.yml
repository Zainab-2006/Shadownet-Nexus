spring:
  application:
    name: shadownet-nexus

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://127.0.0.1:3305/shadownet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:${DATABASE_USER:}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD:}}
    driver-class-name: ${DRIVER_CLASS:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
  web:
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080,http://localhost:8081,https://shadownet-nexus.vercel.app,https://*.vercel.app}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: ${PORT:3001}
  servlet:
    context-path: /
    session:
      cookie:
        http-only: true
        secure: ${SECURE_COOKIES:false}
        same-site: strict

logging:
  level:
    root: INFO
    com.shadownet.nexus: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
    org.flywaydb: INFO
    AUDIT: INFO
    SECURITY: WARN
  pattern:
    console: '%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:when_authorized}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME:${DATABASE_USER}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD}}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

logging:
  level:
    com.shadownet.nexus: INFO
    org.springframework.security: WARN

management:
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
  api-docs:
    enabled: ${API_DOCS_ENABLED:false}

server:
  servlet:
    session:
      cookie:
        secure: true

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/shadownet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: shadownet
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      dialect: org.hibernate.dialect.MySQLDialect
