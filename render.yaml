services:
  - name: shadownet-frontend
    type: web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://shadownet-nexus-3m2s.onrender.com
      - key: VITE_WS_BASE_URL
        value: https://shadownet-nexus-3m2s.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - name: shadownet-backend
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        value: mysql-1ce50080-shadownet-nexus.l.aivencloud.com
      - key: DB_PORT
        value: "12556"
      - key: DB_NAME
        value: defaultdb
      - key: DB_USERNAME
        value: avnadmin
      - key: DB_PASSWORD
        sync: false
      - key: EMAIL_ENCRYPTION_KEY
        generateValue: true
      - key: DB_SSL_MODE
        value: REQUIRED
      - key: DB_ALLOW_PUBLIC_KEY_RETRIEVAL
        value: "true"
      - key: DB_SERVER_TIMEZONE
        value: UTC
      - key: DB_CREATE_IF_NOT_EXIST
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:3000,http://localhost:8080,http://localhost:8081,https://shadownet-frontend.onrender.com,https://shadownet-nexus.vercel.app,https://*.vercel.app
      - key: SECURE_COOKIES
        value: "true"
      - key: REQUIRE_SSL
        value: "true"
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
      - key: SWAGGER_ENABLED
        value: "false"
      - key: API_DOCS_ENABLED
        value: "false"
