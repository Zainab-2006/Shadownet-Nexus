services:
  - name: shadownet-frontend
    type: web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://shadownet-nexus-mecf.onrender.com
      - key: VITE_WS_BASE_URL
        value: https://shadownet-nexus-mecf.onrender.com/ws
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - name: shadownet-backend
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./springboot/Dockerfile
    dockerContext: ./springboot
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromService:
          type: pserv
          name: shadownet-mysql
          property: host
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: shadownet
      - key: DB_USERNAME
        value: shadownet
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_MODE
        value: DISABLED
      - key: DB_ALLOW_PUBLIC_KEY_RETRIEVAL
        value: "true"
      - key: DB_SERVER_TIMEZONE
        value: UTC
      - key: DB_CREATE_IF_NOT_EXIST
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:3000,http://localhost:8080,http://localhost:8081,https://shadownet-frontend.onrender.com,https://shadownet-nexus.vercel.app,https://*.vercel.app
      - key: SECURE_COOKIES
        value: "true"
      - key: SWAGGER_ENABLED
        value: "false"
      - key: API_DOCS_ENABLED
        value: "false"

  - name: shadownet-mysql
    type: pserv
    runtime: image
    plan: starter
    image:
      url: docker.io/mysql:8.0
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: shadownet
      - key: MYSQL_USER
        value: shadownet
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_ROOT_PASSWORD
        sync: false
