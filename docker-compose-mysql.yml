services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-local-only-root}
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: shadownet
      MYSQL_USER: shadownet
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me-local-only}
    ports:
      - "3305:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:

